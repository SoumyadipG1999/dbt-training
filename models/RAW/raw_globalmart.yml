version: 2

models:
   - name: RAW_CUSTOMERS
     columns:
      - name : customerid
        tests :
          - unique
          - not_null
   - name: RAW_ORDERS
     columns:
      - name: orderid
        tests:
          - unique
          - not_null
      - name: shipmode
        tests:
          - accepted_values:
              arguments:
                 values: ['First Class','Same Day','Second Class','Standard Class']